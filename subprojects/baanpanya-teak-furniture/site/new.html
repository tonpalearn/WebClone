<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>บ้านปัญญา เฟอร์นิเจอร์ไม้สัก — คอนเซ็ปต์เว็บใหม่</title>
  <meta name="description" content="คอนเซ็ปต์ redesign ร้านบ้านปัญญา เฟอร์นิเจอร์ไม้สัก (BNP Furniture) สไตล์นิตยสารงานคราฟต์ — ตัวอย่างเพื่อพูดคุย ไม่ใช่เว็บทางการ" />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chonburi&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper: '#f1e7d6', panel: '#e7d9c0', ink: '#221a0f',
            teak: '#9a5e2b', rust: '#7c4421', brass: '#a87c33', forest: '#2c4434'
          },
          fontFamily: {
            display: ['Chonburi', 'serif'],
            serif: ['Fraunces', 'Georgia', 'serif'],
            body: ['"IBM Plex Sans Thai"', 'ui-sans-serif', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #f1e7d6; color: #221a0f; -webkit-font-smoothing: antialiased; }
    .paper-tex:before {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: .5; mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.045'/%3E%3C/svg%3E");
    }
    .rule { border-top: 1px solid rgba(34,26,15,.26); }
    .rule-thick { border-top: 2px solid #221a0f; }
    .dropcap:first-letter { font-family: 'Chonburi', serif; font-size: 3.3em; line-height: .72; float: left; margin: .06em .12em 0 0; color: #9a5e2b; }
    .ul-link { background-image: linear-gradient(currentColor,currentColor); background-size: 100% 1px; background-position: 0 100%; background-repeat: no-repeat; padding-bottom: 2px; transition: background-size .4s cubic-bezier(.16,1,.3,1); }
    .ul-link:hover { background-size: 0% 1px; }
    .hover-card { transition: transform .5s cubic-bezier(.16,1,.3,1), background-color .4s ease; }
    .hover-card:hover { transform: translateY(-4px); background-color: #ece0c8; }
    .vtext { writing-mode: vertical-rl; }
    .reveal { opacity: 0; transform: translateY(20px); animation: rv 1s cubic-bezier(.16,1,.3,1) forwards; }
    .d1 { animation-delay: .1s } .d2 { animation-delay: .2s } .d3 { animation-delay: .3s } .d4 { animation-delay: .42s }
    @keyframes rv { to { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; scroll-behavior: auto !important; } .reveal { opacity: 1; transform: none; } }
  </style>
</head>
<body class="paper-tex font-body">
  <div id="root" class="relative z-10"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  <script>
    // บังคับ Babel ใช้ classic JSX runtime (React.createElement) กัน import react/jsx-runtime ที่ทำให้ไม่ mount
    if (window.Babel && Babel.registerPreset) {
      Babel.registerPreset('react-classic', { presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]] });
    }
  </script>
  <script type="text/babel" data-presets="react-classic">
    const PHONE = '0984287619', PHONE_D = '098-428-7619';
    const PHONE2 = '0835369597', PHONE2_D = '083-536-9597';
    const LINE = 'https://line.me/R/ti/p/@teak';
    const MAP = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent('ถนนราชพฤกษ์ บางรักน้อย นนทบุรี');

    // ── ลายเส้นเฟอร์นิเจอร์ไม้ (แทน emoji) สไตล์ catalog/engraving ──
    function Piece({ k, className }) {
      const c = { fill: 'none', stroke: 'currentColor', strokeWidth: 2.1, strokeLinecap: 'round', strokeLinejoin: 'round' };
      const art = {
        altar: <g {...c}><path d="M58 16h24M70 16v12"/><rect x="50" y="28" width="40" height="9"/><rect x="36" y="45" width="68" height="9"/><rect x="20" y="62" width="100" height="10"/><path d="M28 72v34M112 72v34M52 72v30M88 72v30"/><path d="M20 106h100"/></g>,
        cabinet: <g {...c}><path d="M30 26q40-14 80 0"/><rect x="30" y="26" width="80" height="80"/><path d="M70 26v80"/><circle cx="63" cy="66" r="2.4"/><circle cx="77" cy="66" r="2.4"/><path d="M44 50v32M96 50v32"/><path d="M34 106l-6 10M106 106l6 10"/></g>,
        bed: <g {...c}><rect x="16" y="40" width="22" height="44"/><path d="M22 40v-6M32 40v-6"/><path d="M16 66h106v12H16z"/><path d="M122 78v14M24 84v8"/><path d="M38 66h84"/></g>,
        dining: <g {...c}><path d="M22 50h96v8H22z"/><path d="M34 58v36M106 58v36"/><path d="M44 94h12v-20M84 94h12v-20"/><path d="M44 74h12M84 74h12"/></g>,
        sofa: <g {...c}><path d="M22 60h96v30H22z"/><path d="M22 60v-12h96v12"/><path d="M22 60v-18M118 60v-18"/><path d="M22 42h12v18M106 42h12v18"/><path d="M34 90v10M106 90v10"/><path d="M70 60v30"/></g>,
        bespoke: <g {...c}><path d="M70 22l-22 64M70 22l22 64"/><circle cx="70" cy="22" r="4"/><path d="M48 86l8-6M92 86l-8-6"/><path d="M22 100h96"/><path d="M30 100v-6M46 100v-6M62 100v-6M78 100v-6M94 100v-6M110 100v-6"/></g>
      };
      return <svg viewBox="0 0 140 120" className={className} role="img" aria-hidden="true">{art[k] || art.altar}</svg>;
    }

    function Num({ children, className = '' }) {
      return <span className={`font-display text-brass ${className}`}>{children}</span>;
    }

    function SectionHead({ n, kicker, title, id }) {
      return <div id={id} className="rule pt-6">
        <div className="flex items-baseline gap-4">
          <Num className="text-2xl">{n}</Num>
          <span className="font-serif text-[.7rem] uppercase tracking-[.34em] text-rust">{kicker}</span>
        </div>
        <h2 className="mt-4 max-w-4xl font-display text-[2.4rem] leading-[1.05] text-ink md:text-[3.4rem]">{title}</h2>
      </div>;
    }

    function Masthead() {
      return <header className="mx-auto max-w-6xl px-5 pt-7 md:px-8">
        <div className="flex flex-wrap items-end justify-between gap-3">
          <div className="font-serif text-[.66rem] uppercase tracking-[.32em] text-rust">เฟอร์นิเจอร์ไม้สักแท้ · งานสั่งทำ</div>
          <div className="font-serif text-[.66rem] uppercase tracking-[.32em] text-ink/55">ราชพฤกษ์ · นนทบุรี · ฉบับแนะนำร้าน</div>
        </div>
        <div className="mt-3 flex items-center justify-between rule-thick pt-3">
          <a href="#top" className="font-display text-3xl tracking-tight text-ink md:text-[2.7rem]">บ้านปัญญา</a>
          <nav className="hidden gap-7 font-serif text-sm text-ink/70 md:flex">
            <a className="ul-link" href="#catalog">หมวดงาน</a>
            <a className="ul-link" href="#bespoke">งานสั่งทำ</a>
            <a className="ul-link" href="#marks">จุดเด่น</a>
            <a className="ul-link" href="#visit">เยี่ยมร้าน</a>
          </nav>
          <a href={`tel:${PHONE}`} className="font-serif text-sm font-medium text-rust ul-link md:hidden">โทร</a>
        </div>
      </header>;
    }

    function Hero() {
      return <section id="top" className="mx-auto max-w-6xl px-5 pb-16 pt-12 md:px-8 md:pt-16">
        <div className="grid grid-cols-1 gap-10 lg:grid-cols-12 lg:gap-12">
          <div className="reveal lg:col-span-7">
            <p className="font-serif text-sm italic text-teak">ไม้สักแท้ทุกชิ้น · ส่งตรงจากหน้าร้านริมราชพฤกษ์</p>
            <h1 className="mt-5 font-display text-[3.3rem] leading-[.98] tracking-tight text-ink sm:text-[4.2rem] lg:text-[5.4rem]">
              งานไม้ที่อยู่<br/>กับบ้าน<span className="text-teak">ไปอีก</span><br/>หลายสิบปี
            </h1>
            <p className="dropcap mt-7 max-w-xl font-body text-[1.05rem] leading-8 text-ink/82">
              บ้านปัญญารวมงานเฟอร์นิเจอร์ไม้สักแท้ — โต๊ะหมู่บูชา ตู้พระ เตียง โต๊ะอาหาร โซฟา และงานสั่งทำตามแบบ คัดเนื้อไม้ ประกอบด้วยช่างฝีมือ ให้เป็นเฟอร์นิเจอร์ที่อยู่กับครอบครัวไปได้ยาว ๆ
            </p>
            <div className="mt-8 flex flex-wrap items-center gap-x-7 gap-y-3 font-serif text-sm">
              <a href={`tel:${PHONE}`} className="bg-ink px-6 py-3 font-medium text-paper transition hover:bg-teak">โทร {PHONE_D}</a>
              <a href={LINE} target="_blank" rel="noopener" className="font-medium text-rust ul-link">หรือทักไลน์ @teak →</a>
            </div>
          </div>

          <aside className="reveal d2 lg:col-span-5">
            <figure className="border border-ink/25 bg-panel/50 p-5">
              <Piece k="altar" className="mx-auto h-52 w-full text-rust md:h-60" />
              <figcaption className="mt-3 rule pt-3 font-serif text-xs text-ink/60">
                <span className="italic">แผ่นแบบ</span> — โต๊ะหมู่บูชาไม้สัก, งานเข้าไม้ตามแบบดั้งเดิม
              </figcaption>
            </figure>
            <ol className="mt-5 font-serif text-sm">
              {[['๐๑','หมวดงานไม้สัก','#catalog'],['๐๒','งานสั่งทำตามแบบ','#bespoke'],['๐๓','สี่จุดที่ไว้ใจได้','#marks'],['๐๔','เยี่ยมร้าน · ติดต่อ','#visit']].map(r =>
                <li key={r[0]}><a href={r[2]} className="flex items-center gap-4 rule py-3 text-ink/75 transition hover:text-rust">
                  <Num className="text-base">{r[0]}</Num><span className="ul-link">{r[1]}</span><span className="ml-auto text-ink/30">→</span>
                </a></li>
              )}
            </ol>
          </aside>
        </div>
      </section>;
    }

    function Manifesto() {
      const marks = [['ไม้สักแท้','คัดเนื้อไม้สักธรรมชาติ'],['งานช่างฝีมือ','ประกอบ·แกะด้วยมือ'],['สั่งทำตามแบบ','ปรับขนาดพอดีบ้าน'],['หน้าร้านจริง','ริมถนนราชพฤกษ์']];
      return <section className="mx-auto max-w-6xl px-5 py-10 md:px-8">
        <div className="rule-thick grid gap-8 pt-8 md:grid-cols-[1.5fr_1fr] md:gap-12">
          <p className="font-display text-[1.6rem] leading-[1.25] text-ink md:text-[2.1rem]">
            “เฟอร์นิเจอร์ไม้สักที่ดี ไม่ได้วัดกันที่วันแรกที่ซื้อ แต่วัดกันที่มันยังอยู่ดีในอีกยี่สิบปีข้างหน้า”
          </p>
          <dl className="grid grid-cols-2 gap-x-6 gap-y-5 self-end font-serif">
            {marks.map((m,i) => <div key={m[0]} className="rule pt-3">
              <Num className="text-sm">{['๐๑','๐๒','๐๓','๐๔'][i]}</Num>
              <dt className="mt-1 font-body font-medium text-ink">{m[0]}</dt>
              <dd className="text-[.8rem] text-ink/60">{m[1]}</dd>
            </div>)}
          </dl>
        </div>
      </section>;
    }

    function Catalog() {
      const items = [
        ['๐๑','altar','งานบูชา','โต๊ะหมู่บูชา · ตู้พระ · หิ้งพระ'],
        ['๐๒','bed','ห้องนอน','เตียง · ตู้เสื้อผ้า · โต๊ะเครื่องแป้ง'],
        ['๐๓','sofa','ห้องนั่งเล่น','โซฟาไม้ · ตู้โชว์ · ชั้นวาง'],
        ['๐๔','dining','ห้องอาหาร','โต๊ะอาหาร · เก้าอี้ · ตู้ถ้วยชาม'],
        ['๐๕','cabinet','ตู้ & ที่เก็บของ','ตู้โชว์ · ตู้เก็บของ · ชั้นหนังสือ'],
        ['๐๖','bespoke','งานสั่งทำพิเศษ','ออกแบบ·ปรับขนาดตามบ้าน']
      ];
      return <section className="mx-auto max-w-6xl px-5 py-10 md:px-8">
        <SectionHead id="catalog" n="๐๑" kicker="The Catalog" title="เลือกง่ายเป็นกลุ่ม ไม่ต้องไล่ทีละสิบกว่าหมวด" />
        <p className="mt-4 max-w-2xl font-body text-ink/70">จัดกลุ่มงานให้สแกนเจอเร็วบนมือถือ เลือกหมวดที่ต้องการแล้วโทรหรือทักไลน์สอบถามได้ทันที</p>
        <div className="mt-9 grid gap-px border border-ink/20 bg-ink/20 sm:grid-cols-2 lg:grid-cols-3">
          {items.map(it => <article key={it[0]} className="hover-card flex flex-col bg-paper p-6">
            <div className="flex items-start justify-between">
              <Num className="text-lg">{it[0]}</Num>
              <a href={LINE} target="_blank" rel="noopener" className="font-serif text-xs text-rust ul-link">สอบถาม →</a>
            </div>
            <div className="grid flex-1 place-items-center py-4"><Piece k={it[1]} className="h-28 w-full text-ink/80" /></div>
            <h3 className="rule pt-3 font-display text-xl text-ink">{it[2]}</h3>
            <p className="mt-1 font-serif text-sm text-ink/62">{it[3]}</p>
          </article>)}
        </div>
      </section>;
    }

    function Bespoke() {
      return <section className="mx-auto max-w-6xl px-5 py-10 md:px-8">
        <div className="rule grid gap-8 pt-6 md:grid-cols-2 md:gap-14">
          <div className="order-2 border border-ink/25 p-6 md:order-1">
            <Piece k="bespoke" className="mx-auto h-56 w-full text-teak md:h-72" />
            <p className="mt-3 rule pt-3 text-center font-serif text-xs italic text-ink/55">แบบร่าง — งานสั่งทำตามขนาดและการใช้งานจริง</p>
          </div>
          <div className="order-1 md:order-2">
            <div className="flex items-baseline gap-4"><Num className="text-2xl">๐๒</Num><span className="font-serif text-[.7rem] uppercase tracking-[.34em] text-rust">Bespoke</span></div>
            <h2 className="mt-4 font-display text-[2.4rem] leading-[1.05] text-ink md:text-[3.2rem]">อยากได้แบบไหน<br/>ขนาดเท่าไร บอกได้</h2>
            <p className="mt-6 font-body text-[1.05rem] leading-8 text-ink/80">รับงานสั่งทำเฟอร์นิเจอร์ไม้สักตามแบบและขนาดที่ต้องการ ปรับให้พอดีพื้นที่บ้าน — ส่งรูปแบบที่ชอบหรือเล่าความต้องการมาทางไลน์ ทางร้านช่วยแนะนำได้</p>
            <div className="mt-8 flex flex-wrap items-center gap-x-7 gap-y-3 font-serif text-sm">
              <a href={LINE} target="_blank" rel="noopener" className="bg-forest px-6 py-3 font-medium text-paper transition hover:bg-ink">ส่งแบบทางไลน์</a>
              <a href={`tel:${PHONE2}`} className="font-medium text-rust ul-link">โทร {PHONE2_D} →</a>
            </div>
          </div>
        </div>
      </section>;
    }

    function Marks() {
      const cards = [
        ['ไม้สักแท้','คัดเนื้อไม้สักธรรมชาติสำหรับงานเฟอร์นิเจอร์ ใช้ได้ทนยาวนาน'],
        ['งานช่างฝีมือ','ประกอบและตกแต่งด้วยช่าง เน้นความเรียบร้อยของงานไม้'],
        ['สั่งทำได้ตามแบบ','ปรับดีไซน์และขนาดให้เข้ากับพื้นที่และการใช้งานจริง'],
        ['ทำเลมาดูของได้','หน้าร้านริมถนนราชพฤกษ์ ต.บางรักน้อย นนทบุรี แวะดูชิ้นจริงก่อนตัดสินใจ']
      ];
      return <section className="mx-auto max-w-6xl px-5 py-10 md:px-8">
        <SectionHead id="marks" n="๐๓" kicker="Why Baan Panya" title="ไว้ใจได้ตั้งแต่เลือกไม้ จนถึงหน้าบ้าน" />
        <div className="mt-9 grid gap-px border border-ink/20 bg-ink/20 sm:grid-cols-2">
          {cards.map((c,i) => <div key={c[0]} className="hover-card bg-paper p-7">
            <Num className="font-serif text-4xl">{String(i+1).padStart(2,'0')}</Num>
            <h3 className="mt-4 font-display text-2xl text-ink">{c[0]}</h3>
            <p className="mt-2 font-body leading-7 text-ink/72">{c[1]}</p>
          </div>)}
        </div>
      </section>;
    }

    function Colophon() {
      return <section id="visit" className="mx-auto max-w-6xl px-5 py-10 pb-28 md:px-8">
        <SectionHead n="๐๔" kicker="Visit · Contact" title="แวะดูงานจริงริมราชพฤกษ์" />
        <div className="mt-8 grid gap-8 md:grid-cols-[1.3fr_1fr] md:gap-14">
          <div>
            <p className="font-body text-[1.15rem] leading-9 text-ink/85">ริมถนนราชพฤกษ์ ต.บางรักน้อย อ.เมืองนนทบุรี<br/><span className="text-ink/60">ฝั่งขาเข้ากรุงเทพ ถัดจากหมู่บ้านแกรนด์ บางกอก บูเลอวาร์ด ราชพฤกษ์ ราว 50 เมตร</span></p>
            <div className="mt-6 flex flex-wrap gap-x-7 gap-y-3 font-serif text-sm">
              <a href={`tel:${PHONE}`} className="bg-ink px-6 py-3 font-medium text-paper transition hover:bg-teak">โทรเลย</a>
              <a href={LINE} target="_blank" rel="noopener" className="border border-ink/40 px-6 py-3 font-medium text-ink transition hover:bg-panel">ไลน์ @teak</a>
              <a href={MAP} target="_blank" rel="noopener" className="font-medium text-rust ul-link">เปิดแผนที่ →</a>
            </div>
          </div>
          <dl className="grid grid-cols-1 gap-4 self-start font-serif text-sm">
            {[['โทรศัพท์',`${PHONE_D} · ${PHONE2_D}`],['ไลน์','@teak'],['อีเมล','baanpanya2009@gmail.com']].map(r =>
              <div key={r[0]} className="rule pt-3"><dt className="text-[.66rem] uppercase tracking-[.28em] text-ink/45">{r[0]}</dt><dd className="mt-1 font-body text-ink">{r[1]}</dd></div>
            )}
          </dl>
        </div>
      </section>;
    }

    function Footer() {
      return <footer className="mx-auto max-w-6xl px-5 md:px-8">
        <div className="rule-thick py-7 font-serif text-xs leading-6 text-ink/55">
          <p className="text-ink/75">Concept redesign demo prepared for discussion. Not the official website unless approved by the business owner. Placeholder line-art only — no real logo/photos of the shop.</p>
          <p className="mt-2">ตัวอย่างคอนเซ็ปต์เว็บไซต์ที่ออกแบบเพื่อใช้พูดคุย/เสนอแนวทางเท่านั้น ยังไม่ใช่เว็บไซต์ทางการของธุรกิจนี้ เว้นแต่เจ้าของธุรกิจจะอนุมัติ</p>
        </div>
      </footer>;
    }

    function MobileBar() {
      return <div className="fixed inset-x-0 bottom-0 z-50 grid grid-cols-3 border-t-2 border-ink bg-paper font-serif text-sm md:hidden">
        <a className="bg-ink py-3.5 text-center font-medium text-paper" href={`tel:${PHONE}`}>โทร</a>
        <a className="border-x border-ink/20 py-3.5 text-center font-medium text-ink" href={LINE} target="_blank" rel="noopener">ไลน์</a>
        <a className="py-3.5 text-center font-medium text-ink" href="#visit">แผนที่</a>
      </div>;
    }

    function App() {
      return <>
        <Masthead />
        <main>
          <Hero />
          <Manifesto />
          <Catalog />
          <Bespoke />
          <Marks />
          <Colophon />
        </main>
        <Footer />
        <MobileBar />
      </>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
