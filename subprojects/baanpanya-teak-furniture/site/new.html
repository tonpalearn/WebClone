<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>บ้านปัญญา เฟอร์นิเจอร์ไม้สัก — Glass Redesign Concept</title>
  <meta name="description" content="คอนเซ็ปต์ redesign เว็บไซต์ร้านบ้านปัญญา เฟอร์นิเจอร์ไม้สัก (BNP Furniture) — ตัวอย่างเพื่อพูดคุย ไม่ใช่เว็บทางการ" />

      theme: {

          colors: {
            espresso: '#1a0f08',
            bark: '#2a1a0d',
            teak: '#a8662f',
            amber: '#c8893f',

  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #1a0f08; color: #f7ecd9; overflow-x: hidden; }
    .aurora {
      background:
        radial-gradient(circle at 12% 8%, rgba(200,137,63,.42), transparent 30rem),
        radial-gradient(circle at 80% 12%, rgba(224,178,101,.24), transparent 28rem),
        radial-gradient(circle at 50% 78%, rgba(168,102,47,.30), transparent 40rem),
        linear-gradient(135deg, #1a0f08 0%, #2a1a0d 52%, #140b05 100%);
    }
    .woodgrain:before {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: .10; mix-blend-mode: overlay;
      background-image:
        repeating-linear-gradient(96deg, rgba(247,236,217,.5) 0px, rgba(247,236,217,0) 2px, rgba(0,0,0,.18) 5px, rgba(247,236,217,0) 9px);
    }
    .noise:before {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 50; opacity: .10; mix-blend-mode: screen;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.5'/%3E%3C/svg%3E");
    }
    .glass { background: linear-gradient(145deg, rgba(247,236,217,.15), rgba(247,236,217,.045)); border: 1px solid rgba(247,236,217,.18); backdrop-filter: blur(24px) saturate(160%); box-shadow: 0 24px 90px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.14); }
    .glass-dark { background: linear-gradient(145deg, rgba(42,26,13,.80), rgba(42,26,13,.44)); border: 1px solid rgba(247,236,217,.16); backdrop-filter: blur(22px) saturate(150%); box-shadow: 0 24px 90px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.10); }
    .text-balance { text-wrap: balance; }
    .reveal { opacity: 0; transform: translateY(24px); filter: blur(7px); animation: reveal .9s cubic-bezier(.16,1,.3,1) forwards; }
    .delay-1 { animation-delay: .12s; } .delay-2 { animation-delay: .22s; } .delay-3 { animation-delay: .32s; }
    @keyframes reveal { to { opacity: 1; transform: none; filter: none; } }
    @media (prefers-reduced-motion: reduce) { * { animation-duration: .01ms !important; scroll-behavior: auto !important; transition-duration: .01ms !important; } }

</head>
<body class="aurora woodgrain noise font-body">

  <script>

    }
  </script>
  <script type="text/babel" data-presets="react-classic">

            <div className="mt-2 text-xs font-bold uppercase tracking-[.18em] text-cream/80">{label}</div>
          </div>
        </div>
      </div>;
    }

    function Nav() {
      return <header className="fixed left-3 right-3 top-3 z-40 mx-auto grid max-w-7xl grid-cols-[auto_1fr_auto] items-center gap-4 rounded-full border border-white/15 bg-espresso/60 px-3 py-2 shadow-glass backdrop-blur-2xl md:left-6 md:right-6 md:top-5">
        <a href="#top" className="flex min-w-0 items-center gap-3" aria-label="บ้านปัญญา top">
          <span className="grid h-12 w-12 place-items-center rounded-full border border-brass/40 bg-gradient-to-br from-teak to-bark text-2xl">🪵</span>
          <span className="leading-tight">
            <strong className="block tracking-[.10em] text-cream">บ้านปัญญา</strong>

        <nav className="hidden justify-center gap-8 text-sm font-semibold text-sand/75 lg:flex" aria-label="main">

          <a className="hover:text-brass" href="#custom">งานสั่งทำ</a>
          <a className="hover:text-brass" href="#why">จุดเด่น</a>

        <a href={`tel:${PHONE}`} className="rounded-full bg-gradient-to-r from-brass to-honey px-5 py-3 text-sm font-black text-espresso shadow-[0_12px_34px_rgba(224,178,101,.30)]">โทร</a>

    function Hero() {
      return <section id="top" className="relative mx-auto grid min-h-screen max-w-7xl grid-cols-1 items-center gap-10 px-4 pb-20 pt-32 md:px-8 lg:grid-cols-[1.02fr_.98fr] lg:pt-40">
        <div className="reveal">

            <a className="rounded-full bg-gradient-to-r from-teak to-amber px-7 py-4 text-center font-black text-cream shadow-glow transition hover:-translate-y-1" href={`tel:${PHONE}`}>โทร 098-428-7619 →</a>
            <a className="glass rounded-full px-7 py-4 text-center font-black text-cream transition hover:-translate-y-1" href={LINE} target="_blank" rel="noopener">แชต Line @teak</a>

          <div className="mt-8 grid max-w-lg grid-cols-3 gap-3 text-center">

            <div className="glass-dark rounded-2xl p-3"><strong className="block text-lg text-honey">หน้าร้านจริง</strong><span className="text-xs text-sand/65">ราชพฤกษ์</span></div>

    function ValueStrip() {
