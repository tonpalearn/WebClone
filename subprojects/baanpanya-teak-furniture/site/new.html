<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>บ้านปัญญา เฟอร์นิเจอร์ไม้สัก — คอนเซ็ปต์เว็บใหม่</title>
  <meta name="description" content="คอนเซ็ปต์ redesign ร้านบ้านปัญญา เฟอร์นิเจอร์ไม้สัก (BNP Furniture) สไตล์มินิมอลหรู — ตัวอย่างเพื่อพูดคุย ไม่ใช่เว็บทางการ" />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Trirong:wght@200;300;400&family=Jost:wght@300;400;500&family=IBM+Plex+Sans+Thai:wght@300;400&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ivory: '#faf8f4', cloud: '#f1ebe0', ink: '#17150f', stone: '#6b6456', gold: '#a8895f', line: '#e4dccd'
          },
          fontFamily: {
            serif: ['"Cormorant Garamond"', 'Trirong', 'serif'],
            sans: ['Jost', '"IBM Plex Sans Thai"', 'ui-sans-serif', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #faf8f4; color: #17150f; -webkit-font-smoothing: antialiased; }
    .label { font-family: 'Jost', sans-serif; text-transform: uppercase; letter-spacing: .34em; font-size: .66rem; }
    .hair { border-top: 1px solid #e4dccd; }
    .ul { background-image: linear-gradient(currentColor,currentColor); background-size: 100% 1px; background-position: 0 100%; background-repeat: no-repeat; padding-bottom: 3px; transition: background-size .5s cubic-bezier(.16,1,.3,1), color .3s; }
    .ul:hover { background-size: 0 1px; color: #a8895f; }
    .row { transition: background-color .5s cubic-bezier(.16,1,.3,1); }
    .row:hover { background-color: #f1ebe0; }
    .row:hover .rowname { color: #a8895f; }
    .rowname { transition: color .4s; }
    .rv { opacity: 0; transform: translateY(18px); animation: rv 1.1s cubic-bezier(.16,1,.3,1) forwards; }
    .d1 { animation-delay: .12s } .d2 { animation-delay: .26s } .d3 { animation-delay: .4s }
    @keyframes rv { to { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: reduce) { *, .rv { animation: none !important; opacity: 1 !important; transform: none !important; scroll-behavior: auto !important; } }
  </style>
</head>
<body class="font-sans">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  <script>
    // บังคับ Babel ใช้ classic JSX runtime (React.createElement) กัน import react/jsx-runtime ที่ทำให้ไม่ mount
    if (window.Babel && Babel.registerPreset) {
      Babel.registerPreset('react-classic', { presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]] });
    }
  </script>
  <script type="text/babel" data-presets="react-classic">
    const PHONE = '0984287619', PHONE_D = '098 428 7619';
    const PHONE2 = '0835369597', PHONE2_D = '083 536 9597';
    const LINE = 'https://line.me/R/ti/p/@teak';
    const MAP = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent('ถนนราชพฤกษ์ บางรักน้อย นนทบุรี');

    // ลายเส้นเฟอร์นิเจอร์ไม้ บางเบา (แทนรูปจริง) — minimal
    function Piece({ k, className, sw = 1.4 }) {
      const c = { fill: 'none', stroke: 'currentColor', strokeWidth: sw, strokeLinecap: 'round', strokeLinejoin: 'round' };
      const art = {
        altar: <g {...c}><path d="M58 16h24M70 16v12"/><rect x="50" y="28" width="40" height="9"/><rect x="36" y="45" width="68" height="9"/><rect x="20" y="62" width="100" height="10"/><path d="M28 72v34M112 72v34M52 72v30M88 72v30"/></g>,
        cabinet: <g {...c}><path d="M30 26q40-14 80 0"/><rect x="30" y="26" width="80" height="80"/><path d="M70 26v80"/><circle cx="63" cy="66" r="2.4"/><circle cx="77" cy="66" r="2.4"/><path d="M34 106l-6 10M106 106l6 10"/></g>,
        bed: <g {...c}><rect x="16" y="40" width="22" height="44"/><path d="M16 66h106v12H16z"/><path d="M122 78v14M24 84v8"/></g>,
        dining: <g {...c}><path d="M22 50h96v8H22z"/><path d="M34 58v36M106 58v36"/><path d="M44 94h12v-20M84 94h12v-20"/></g>,
        sofa: <g {...c}><path d="M22 60h96v30H22z"/><path d="M22 60v-12h96v12"/><path d="M22 60v-18M118 60v-18"/><path d="M22 42h12v18M106 42h12v18"/></g>,
        bespoke: <g {...c}><path d="M70 22l-22 64M70 22l22 64"/><circle cx="70" cy="22" r="4"/><path d="M22 100h96"/><path d="M30 100v-6M62 100v-6M94 100v-6"/></g>
      };
      return <svg viewBox="0 0 140 120" className={className} role="img" aria-hidden="true">{art[k] || art.altar}</svg>;
    }

    function Plate({ k, label, className = '' }) {
      return <figure className={`relative overflow-hidden bg-cloud ${className}`}>
        <div className="absolute inset-0" style={{ background: 'radial-gradient(120% 90% at 50% 30%, #f6f1e8 0%, #ece3d4 60%, #e4d8c4 100%)' }}></div>
        <div className="absolute inset-0 grid place-items-center p-10"><Piece k={k} className="h-2/3 w-2/3 text-stone/70" /></div>
        {label && <figcaption className="absolute bottom-5 left-6 label text-stone/70">{label}</figcaption>}
      </figure>;
    }

    function Top() {
      return <header className="fixed inset-x-0 top-0 z-40 bg-ivory/85 backdrop-blur-md">
        <div className="mx-auto flex max-w-6xl items-center justify-between px-6 py-4 md:px-10">
          <a href="#top" className="font-serif text-2xl tracking-wide text-ink">บ้านปัญญา</a>
          <nav className="hidden gap-9 label text-stone md:flex">
            <a className="ul" href="#collection">Collection</a>
            <a className="ul" href="#bespoke">Bespoke</a>
            <a className="ul" href="#visit">Visit</a>
          </nav>
          <a href={`tel:${PHONE}`} className="ul label text-ink">โทร</a>
        </div>
        <div className="hair mx-auto max-w-6xl"></div>
      </header>;
    }

    function Hero() {
      return <section id="top" className="mx-auto grid max-w-6xl grid-cols-1 gap-12 px-6 pb-24 pt-36 md:px-10 lg:min-h-screen lg:grid-cols-[1.05fr_.95fr] lg:items-center lg:gap-16 lg:pt-32">
        <div className="rv">
          <p className="label text-gold">Baan Panya · Teak Atelier · ราชพฤกษ์</p>
          <h1 className="mt-8 font-serif text-[3.6rem] font-light leading-[1.02] tracking-tight text-ink sm:text-7xl lg:text-[5.6rem]">
            ไม้สักแท้<br/>ที่อยู่กับบ้าน<br/><span className="italic text-gold">ชั่วอายุคน</span>
          </h1>
          <p className="mt-9 max-w-md font-sans text-[1.02rem] font-light leading-8 text-stone">
            เฟอร์นิเจอร์ไม้สักแท้ คัดเนื้อไม้และประกอบด้วยช่างฝีมือ — โต๊ะหมู่บูชา ตู้พระ เตียง โต๊ะอาหาร โซฟา และงานสั่งทำตามแบบ จากหน้าร้านริมถนนราชพฤกษ์
          </p>
          <div className="mt-11 flex flex-wrap items-center gap-x-9 gap-y-4">
            <a href={`tel:${PHONE}`} className="border border-ink px-8 py-3.5 label text-ink transition hover:bg-ink hover:text-ivory">โทร {PHONE_D}</a>
            <a href={LINE} target="_blank" rel="noopener" className="ul label text-stone">ทักไลน์ @teak</a>
          </div>
        </div>
        <div className="rv d1 lg:h-[78vh]">
          <Plate k="altar" label="โต๊ะหมู่บูชาไม้สัก" className="h-[60vh] w-full lg:h-full" />
        </div>
      </section>;
    }

    function Collection() {
      const items = [
        ['๐๑','altar','งานบูชา','โต๊ะหมู่บูชา · ตู้พระ · หิ้งพระ'],
        ['๐๒','bed','ห้องนอน','เตียง · ตู้เสื้อผ้า · โต๊ะเครื่องแป้ง'],
        ['๐๓','sofa','ห้องนั่งเล่น','โซฟาไม้ · ตู้โชว์ · ชั้นวาง'],
        ['๐๔','dining','ห้องอาหาร','โต๊ะอาหาร · เก้าอี้ · ตู้ถ้วยชาม'],
        ['๐๕','cabinet','ตู้ & ที่เก็บของ','ตู้โชว์ · ตู้เก็บของ · ชั้นหนังสือ']
      ];
      return <section id="collection" className="mx-auto max-w-6xl px-6 py-24 md:px-10">
        <div className="flex items-end justify-between">
          <h2 className="font-serif text-4xl font-light text-ink md:text-5xl">คอลเลกชัน</h2>
          <span className="label text-stone">The Collection</span>
        </div>
        <div className="mt-12 hair">
          {items.map(it => <a key={it[0]} href={LINE} target="_blank" rel="noopener"
            className="row hair grid grid-cols-[auto_1fr_auto] items-center gap-6 px-2 py-7 md:gap-10 md:px-5">
            <span className="font-serif text-xl text-gold">{it[0]}</span>
            <div className="min-w-0">
              <h3 className="rowname font-serif text-3xl font-light text-ink md:text-4xl">{it[2]}</h3>
              <p className="mt-1 font-sans text-sm font-light text-stone">{it[3]}</p>
            </div>
            <Piece k={it[1]} className="hidden h-16 w-24 text-ink/35 sm:block" />
          </a>)}
        </div>
      </section>;
    }

    function Bespoke() {
      return <section id="bespoke" className="bg-cloud/60">
        <div className="mx-auto grid max-w-6xl grid-cols-1 gap-12 px-6 py-24 md:px-10 lg:grid-cols-2 lg:items-center lg:gap-20">
          <Plate k="bespoke" label="งานสั่งทำตามแบบ" className="h-[52vh] w-full" />
          <div>
            <span className="label text-gold">Bespoke · งานสั่งทำ</span>
            <h2 className="mt-6 font-serif text-4xl font-light leading-tight text-ink md:text-5xl">อยากได้แบบไหน ขนาดเท่าไร บอกได้</h2>
            <p className="mt-7 max-w-md font-sans font-light leading-8 text-stone">
              รับงานสั่งทำเฟอร์นิเจอร์ไม้สักตามแบบและขนาดที่ต้องการ ปรับให้พอดีพื้นที่บ้าน ส่งรูปแบบที่ชอบหรือเล่าความต้องการมาทางไลน์ ทางร้านช่วยแนะนำได้
            </p>
            <div className="mt-10 flex flex-wrap items-center gap-x-9 gap-y-4">
              <a href={LINE} target="_blank" rel="noopener" className="border border-ink px-8 py-3.5 label text-ink transition hover:bg-ink hover:text-ivory">ส่งแบบทางไลน์</a>
              <a href={`tel:${PHONE2}`} className="ul label text-stone">โทร {PHONE2_D}</a>
            </div>
          </div>
        </div>
      </section>;
    }

    function Marks() {
      const cards = [
        ['ไม้สักแท้','คัดเนื้อไม้สักธรรมชาติสำหรับงานเฟอร์นิเจอร์ ใช้ได้ทนยาวนาน'],
        ['งานช่างฝีมือ','ประกอบและตกแต่งด้วยช่าง เน้นความเรียบร้อยของงานไม้'],
        ['สั่งทำตามแบบ','ปรับดีไซน์และขนาดให้เข้ากับพื้นที่และการใช้งานจริง'],
        ['หน้าร้านริมราชพฤกษ์','แวะดูชิ้นงานจริงก่อนตัดสินใจได้ทุกวัน']
      ];
      return <section className="mx-auto max-w-6xl px-6 py-24 md:px-10">
        <div className="grid grid-cols-1 gap-x-12 gap-y-12 sm:grid-cols-2 lg:grid-cols-4">
          {cards.map((c,i) => <div key={c[0]}>
            <span className="font-serif text-5xl font-light text-gold/70">{String(i+1).padStart(2,'0')}</span>
            <div className="hair mt-5 pt-5">
              <h3 className="font-serif text-2xl font-normal text-ink">{c[0]}</h3>
              <p className="mt-3 font-sans text-sm font-light leading-7 text-stone">{c[1]}</p>
            </div>
          </div>)}
        </div>
      </section>;
    }

    function Visit() {
      return <section id="visit" className="bg-ink text-ivory">
        <div className="mx-auto max-w-6xl px-6 py-24 md:px-10">
          <span className="label text-gold">Visit · Contact</span>
          <h2 className="mt-6 max-w-2xl font-serif text-4xl font-light leading-tight md:text-6xl">แวะชมงานจริง<br/>ริมถนนราชพฤกษ์</h2>
          <div className="mt-12 grid grid-cols-1 gap-10 md:grid-cols-[1.4fr_1fr]">
            <p className="max-w-lg font-sans text-lg font-light leading-9 text-ivory/85">
              ริมถนนราชพฤกษ์ ต.บางรักน้อย อ.เมืองนนทบุรี<br/>
              <span className="text-ivory/55">ฝั่งขาเข้ากรุงเทพ ถัดจากหมู่บ้านแกรนด์ บางกอก บูเลอวาร์ด ราชพฤกษ์ ราว 50 เมตร</span>
            </p>
            <dl className="grid grid-cols-1 gap-5 font-sans text-sm font-light">
              {[['โทรศัพท์',`${PHONE_D} · ${PHONE2_D}`],['ไลน์','@teak'],['อีเมล','baanpanya2009@gmail.com']].map(r =>
                <div key={r[0]} className="border-t border-ivory/15 pt-3"><dt className="label text-ivory/45">{r[0]}</dt><dd className="mt-1.5 text-ivory">{r[1]}</dd></div>
              )}
            </dl>
          </div>
          <div className="mt-12 flex flex-wrap gap-x-9 gap-y-4">
            <a href={`tel:${PHONE}`} className="border border-ivory px-8 py-3.5 label text-ivory transition hover:bg-ivory hover:text-ink">โทรเลย</a>
            <a href={LINE} target="_blank" rel="noopener" className="ul label text-ivory/80">ไลน์ @teak</a>
            <a href={MAP} target="_blank" rel="noopener" className="ul label text-ivory/80">เปิดแผนที่</a>
          </div>
        </div>
      </section>;
    }

    function Footer() {
      return <footer className="mx-auto max-w-6xl px-6 md:px-10">
        <div className="py-10 font-sans text-xs font-light leading-6 text-stone">
          <p>Concept redesign demo prepared for discussion. Not the official website unless approved by the business owner. Placeholder line-art only — no real logo/photos of the shop.</p>
          <p className="mt-2">ตัวอย่างคอนเซ็ปต์เว็บไซต์ที่ออกแบบเพื่อใช้พูดคุย/เสนอแนวทางเท่านั้น ยังไม่ใช่เว็บไซต์ทางการของธุรกิจนี้ เว้นแต่เจ้าของธุรกิจจะอนุมัติ</p>
        </div>
      </footer>;
    }

    function MobileBar() {
      return <div className="fixed inset-x-0 bottom-0 z-50 grid grid-cols-3 border-t border-line bg-ivory/95 backdrop-blur-md label md:hidden">
        <a className="bg-ink py-4 text-center text-ivory" href={`tel:${PHONE}`}>โทร</a>
        <a className="border-x border-line py-4 text-center text-ink" href={LINE} target="_blank" rel="noopener">ไลน์</a>
        <a className="py-4 text-center text-ink" href="#visit">แผนที่</a>
      </div>;
    }

    function App() {
      return <>
        <Top />
        <main>
          <Hero />
          <Collection />
          <Bespoke />
          <Marks />
          <Visit />
        </main>
        <Footer />
        <MobileBar />
      </>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
