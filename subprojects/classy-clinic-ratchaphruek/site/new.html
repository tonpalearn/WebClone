<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta name="description" content="คอนเซ็ปต์ redesign Classy Clinic สาขาราชพฤกษ์ คลินิกความงามพรีเมียม — ตัวอย่างเพื่อพูดคุย ไม่ใช่เว็บทางการ" />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&family=IBM+Plex+Sans+Thai:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ivory: '#fbf9f5', cream: '#f4eee3', sand: '#e9dfcb', ink: '#161310',
            charcoal: '#211d18', stone: '#7a7164', gold: '#b08d50', goldlt: '#c9a978', line: '#e7ddcb'
          },
          fontFamily: {
            serif: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            sans: ['Jost', '"IBM Plex Sans Thai"', 'ui-sans-serif', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #fbf9f5; color: #161310; -webkit-font-smoothing: antialiased; }
    .label { font-family: 'Jost', sans-serif; text-transform: uppercase; letter-spacing: .32em; font-size: .66rem; }
    .hair { border-top: 1px solid #e7ddcb; }
    .goldrule { height: 1px; background: linear-gradient(90deg, transparent, #b08d50 50%, transparent); }
    .ul { background-image: linear-gradient(currentColor,currentColor); background-size: 100% 1px; background-position: 0 100%; background-repeat: no-repeat; padding-bottom: 3px; transition: background-size .5s cubic-bezier(.16,1,.3,1), color .3s; }
    .ul:hover { background-size: 0 1px; color: #b08d50; }
    .btn-gold { background: #161310; color: #fbf9f5; border: 1px solid #161310; transition: all .4s cubic-bezier(.16,1,.3,1); }
    .btn-gold:hover { background: #b08d50; border-color: #b08d50; color: #fff; }
    .btn-out { border: 1px solid #b08d50; color: #161310; transition: all .4s cubic-bezier(.16,1,.3,1); }
    .btn-out:hover { background: #b08d50; color: #fff; }
    .svc { transition: border-color .5s, transform .5s cubic-bezier(.16,1,.3,1); }
    .svc:hover { border-color: #b08d50; transform: translateY(-4px); }
    .svc:hover .svc-no { color: #b08d50; }
    .svc-no { transition: color .4s; }
    .rv { opacity: 0; transform: translateY(20px); animation: rv 1.1s cubic-bezier(.16,1,.3,1) forwards; }
    .d1 { animation-delay: .12s } .d2 { animation-delay: .26s } .d3 { animation-delay: .4s }
    @keyframes rv { to { opacity: 1; transform: none; } }
    .kenburns { animation: kb 18s ease-out infinite alternate; }
    @keyframes kb { from { transform: scale(1); } to { transform: scale(1.08); } }
    @media (prefers-reduced-motion: reduce) { *, .rv, .kenburns { animation: none !important; opacity: 1 !important; transform: none !important; scroll-behavior: auto !important; } }
  </style>
</head>
<body class="font-sans">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
  <script>
    // บังคับ Babel ใช้ classic JSX runtime (React.createElement) กัน import react/jsx-runtime ที่ทำให้ไม่ mount
    if (window.Babel && Babel.registerPreset) {
      Babel.registerPreset('react-classic', { presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]] });
    }
  </script>
  <script type="text/babel" data-presets="react-classic">
    const PHONE = '0628293563', PHONE_D = '062 829 3563';
    const PHONE2 = '0911524266', PHONE2_D = '091 152 4266';
    const ADDR = '96/9 ม.1 ต.อ้อมเกร็ด อ.ปากเกร็ด นนทบุรี 11120';
    const MAP = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent('Classy Clinic ราชพฤกษ์ ปากเกร็ด นนทบุรี');
    const IMG = {
      doctor: '../assets/doctor-team.webp',
      facility: '../assets/facility-05.webp',
      aesthetic: '../assets/aesthetic-img.webp',
      logo: '../assets/logo.png'
    };

    function GoldRule({ className = '' }) { return <div className={`goldrule ${className}`} />; }

    function Top() {
      const [open, setOpen] = React.useState(false);
      return (

            <a href="#top" className="flex items-center gap-3">
              <img src={IMG.logo} alt="Classy Clinic" className="h-7 w-auto" />
              <span className="hidden font-serif text-lg tracking-[.18em] text-ink sm:block">CLASSY CLINIC</span>
            </a>
            <nav className="hidden items-center gap-9 label text-stone lg:flex">
              <a className="ul" href="#services">บริการ</a>
              <a className="ul" href="#tech">เทคโนโลยี</a>
              <a className="ul" href="#trust">ทำไมต้องเรา</a>
              <a className="ul" href="#visit">ติดต่อ</a>
            </nav>
            <div className="flex items-center gap-3">
              <a href={`tel:${PHONE}`} className="hidden btn-gold rounded-full px-5 py-2.5 label sm:inline-block">โทร {PHONE_D}</a>

              </button>
            </div>
          </div>
          <div className="hair mx-auto max-w-6xl"></div>
          {open && (
            <nav className="lg:hidden bg-ivory px-5 pb-5 pt-2 label text-stone">
              {[['บริการ','#services'],['เทคโนโลยี','#tech'],['ทำไมต้องเรา','#trust'],['ติดต่อ','#visit']].map(i =>

              )}
            </nav>
          )}

      );
    }

    function Hero() {
      return (
        <section id="top" className="relative isolate min-h-screen overflow-hidden">

            <img src={IMG.doctor} alt="ปรึกษาแพทย์ผู้เชี่ยวชาญ Classy Clinic" className="kenburns h-full w-full object-cover" />
            <div className="absolute inset-0" style={{ background: 'linear-gradient(105deg, rgba(251,249,245,.96) 0%, rgba(251,249,245,.86) 38%, rgba(251,249,245,.35) 70%, rgba(33,29,24,.12) 100%)' }}></div>
          </div>
          <div className="mx-auto flex min-h-screen max-w-6xl flex-col justify-center px-5 pb-16 pt-32 md:px-10">

              <p className="rv label text-gold">Classy Clinic · สาขาราชพฤกษ์</p>
              <h1 className="rv d1 mt-7 font-serif text-[3.1rem] font-medium leading-[1.02] tracking-tight text-ink sm:text-6xl lg:text-[4.7rem]">

                <a href={`tel:${PHONE}`} className="btn-gold rounded-full px-8 py-3.5 label">ปรึกษาฟรี · จองคิว</a>

          </div>
        </div>
      );
    }

    function Services() {
      const groups = [
        ['๐๑','ฟิลเลอร์ & ออกแบบรูปหน้า','Filler & Face Design','เติมเต็มและปรับโครงหน้าให้ได้สัดส่วนสมดุล วางแผนเฉพาะบุคคลโดยแพทย์'],
        ['๐๒','โบทูลินั่ม ท็อกซิน','Botulinum Toxin','ปรับริ้วรอยจากการแสดงสีหน้า ลดกราม เก็บรายละเอียดให้ดูเป็นธรรมชาติ'],
        ['๐๓','ร้อยไหม','Thread Lift','ยกกระชับด้วยไหมเทคนิคต่าง ๆ ปรึกษาแพทย์เพื่อเลือกวิธีที่เหมาะกับโครงหน้า'],

        ['๐๖','ศัลยกรรมจมูก','Rhinoplasty','ปรับรูปทรงจมูกให้รับกับใบหน้า ประเมินและวางแผนโดยแพทย์เฉพาะทาง']
      ];
      return (
        <section id="services" className="mx-auto max-w-6xl px-5 py-24 md:px-10">
          <div className="flex flex-col items-start justify-between gap-3 sm:flex-row sm:items-end">
            <div>
              <p className="label text-gold">บริการของเรา</p>

          </div>
          <GoldRule className="mt-8" />
          <div className="mt-10 grid gap-px sm:grid-cols-2 lg:grid-cols-3">

                  </div>
                )}
              </div>
            </div>
          </div>
        </section>
      );
    }

    function CTA() {
      return (
        <section className="bg-cream/70">
          <div className="mx-auto max-w-4xl px-5 py-20 text-center md:px-10">
            <p className="label text-gold">นัดหมายเข้ารับคำปรึกษา</p>
            <h2 className="mt-5 font-serif text-4xl font-medium leading-tight text-ink md:text-6xl">พร้อมออกแบบความงาม<br/>ในแบบของคุณ</h2>

    function Visit() {
      return (

                <h2 className="mt-6 max-w-xl font-serif text-4xl font-medium leading-tight md:text-6xl">Classy Clinic<br/>สาขาราชพฤกษ์</h2>

                <div className="mt-10 flex flex-wrap gap-x-6 gap-y-3">

                    <dt className="label text-ivory/45">{r[0]}</dt>
                    <dd className="mt-2 whitespace-pre-line text-ivory">{r[1]}</dd>
                  </div>
                )}
              </dl>
            </div>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer className="bg-ink text-ivory/55">
          <div className="goldrule"></div>
          <div className="mx-auto max-w-6xl px-5 py-10 md:px-10">
            <div className="flex flex-col items-start justify-between gap-4 sm:flex-row sm:items-center">
              <img src={IMG.logo} alt="Classy Clinic" className="h-7 w-auto opacity-90" style={{ filter: 'brightness(0) invert(1)' }} />
              <p className="font-sans text-xs font-light text-ivory/45">© Classy Clinic · สาขาราชพฤกษ์ · {PHONE_D}, {PHONE2_D}</p>
            </div>
            <div className="mt-8 font-sans text-xs font-light leading-6 text-ivory/40">
              <p>Concept redesign demo prepared for discussion. Not the official website unless approved by the business owner. Real photos used are from the business's public website for proposal purposes only — no fabricated reviews, prices, awards, or treatment-result claims.</p>
              <p class="mt-2">ตัวอย่างคอนเซ็ปต์เว็บไซต์เพื่อใช้พูดคุย/เสนอแนวทางเท่านั้น ยังไม่ใช่เว็บไซต์ทางการของธุรกิจนี้ เว้นแต่เจ้าของธุรกิจจะอนุมัติ · ข้อมูลทั่วไป ไม่ใช่คำโฆษณาผลการรักษา โปรดปรึกษาแพทย์ก่อนเข้ารับบริการ</p>
            </div>
          </div>
        </footer>
      );
    }

    function MobileBar() {
      return (
        <div className="fixed inset-x-0 bottom-0 z-50 grid grid-cols-3 border-t border-line bg-ivory/95 backdrop-blur-md label lg:hidden">
          <a className="bg-ink py-4 text-center text-ivory" href={`tel:${PHONE}`}>โทร</a>
          <a className="border-x border-line py-4 text-center text-ink" href={`tel:${PHONE2}`}>สายที่ 2</a>
          <a className="py-4 text-center text-ink" href={MAP} target="_blank" rel="noopener">แผนที่</a>
        </div>
      );
    }

    function App() {
      return (
        <React.Fragment>
          <Top />
          <main>
            <Hero />
            <Marquee />
            <Services />
            <Tech />
            <Trust />
            <CTA />
            <Visit />
          </main>
          <Footer />
          <MobileBar />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
